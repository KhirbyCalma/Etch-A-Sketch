<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Etch-A-Sketch</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>Etch-A-Sketch</header>
        <main>
            <section class="grid-controls">
                <input type="color" id="color-picker" name="color-picker" value="#000000">
                <button id="color-mode">Draw</button>
                <button id="eraser-mode">Eraser</button>
                <button id="clear-mode">Clear</button>
                <div id="grid-size-controls">
                    <input type="range" min="1" max="64" value="16" id="grid-size-slider" name="grid-size-slider">
                    <label for="grid-size-slider">
                        <output id="grid-size-output"></output>
                    </label>
                </div>
            </section>
            <section id="grid-container">
                
            </section>
        </main>
        <footer>
            <p>Copyright &copy; Khirby Calma, <script>document.write(new Date().getFullYear());</script></p>
        </footer>
    </body>
</html>
